service:
  db:
    image: postgres:16:alpine
    container_name: jerney-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=jerney_user
      - POSTGRES_PASSWORD=jerney_pass_2026
      - POSTGRES_DB=jerney_db
    volumes:
      - jerney-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jerney_user -d jerney_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  tmps:
    -/tmp
    -/run

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jerney-backend
    restart: unless-stopped
    environment:
      - PORT=5000
        DB_HOST=db
      - DB_PORT=5432
      - DB_USER=jerney_user
      - DB_PASSWORD=jerney_pass_2026
      - DB_NAME=jerney_db
      - 
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
         # Security: do not run as root (already in Dockerfile, but enforced here too)
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jerney-frontend
    restart: unless-stopped
   
    ports:
      - "80:8080"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp


volumes:
  jerney-db-data:
    driver: local