apiVersion: v1
kind: Namespace
metadata:
  name: jerney
  labels:
    app: jerney
---
apiVersion: v1
kind: Secret
metadata:
  name: jerney-db-credentials
  namespace: jerney
  labels:
    app: jerney
type: Opaque
stringData:
  DB_USER: jerneyuser
  DB_PASSWORD: supersecret123
---
apiVersion: v1
kind: Secret
metadata:
  name: jerney-api-keys
  namespace: jerney
  labels:
    app: jerney
type: Opaque
stringData:
  OPENAI_API_KEY: "your-openai-key-here"
  GITHUB_TOKEN: "your-github-token-here"