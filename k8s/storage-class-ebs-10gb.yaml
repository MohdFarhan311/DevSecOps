---
# StorageClass for EBS volumes in EKS
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-10gb-storage
provisioner: ebs.csi.aws.com
allowVolumeExpansion: true
parameters:
  type: gp3
  iops: "100"
  throughput: "125"
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete

---
# PersistentVolumeClaim for 10GB storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-10gb-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-10gb-storage
  resources:
    requests:
      storage: 10Gi

---
# Example Pod using the 10GB storage
apiVersion: v1
kind: Pod
metadata:
  name: app-with-storage
  namespace: default
spec:
  containers:
  - name: app
    image: nginx:latest
    volumeMounts:
    - name: data-volume
      mountPath: /data
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  volumes:
  - name: data-volume
    persistentVolumeClaim:
      claimName: ebs-10gb-pvc
